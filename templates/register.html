{% extends 'base.html' %}

{% block title %}Регистрация - AVITA{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h1>Создать аккаунт</h1>
                <p>Присоединяйтесь к AVITA</p>
            </div>
            
            <form method="POST" class="auth-form">
                <div class="form-group">
                    <label for="username">Имя пользователя</label>
                    <div class="input-wrapper">
                        <i class="fas fa-user"></i>
                        <input type="text" id="username" name="username" placeholder="Ваше имя" required>
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="email">Email</label>
                    <div class="input-wrapper">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="email" name="email" placeholder="your@email.com" required>
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="phone">Телефон</label>
                    <div class="input-wrapper">
                        <i class="fas fa-phone"></i>
                        <input type="tel" id="phone" name="phone" placeholder="+7 (999) 123-45-67">
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="password">Пароль</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="password" name="password" placeholder="Минимум 6 символов" required minlength="6">
                        <button type="button" class="toggle-password"><i class="fas fa-eye"></i></button>
                    </div>
                </div>
                
                <div class="form-group">
                    <label>Тип аккаунта</label>
                    <div class="role-selector">
                        <label class="role-option">
                            <input type="radio" name="role" value="buyer" checked>
                            <div class="role-card">
                                <i class="fas fa-shopping-bag"></i>
                                <span>Покупатель</span>
                                <small>Покупайте и продавайте товары</small>
                            </div>
                        </label>
                        <label class="role-option">
                            <input type="radio" name="role" value="master">
                            <div class="role-card">
                                <i class="fas fa-tools"></i>
                                <span>Мастер</span>
                                <small>Предлагайте услуги и создавайте вакансии</small>
                            </div>
                        </label>
                    </div>
                </div>
                
                <div class="form-options">
                    <label class="checkbox-label">
                        <input type="checkbox" name="agree" required>
                        <span class="checkmark"></span>
                        Я согласен с <a href="#">условиями использования</a>
                    </label>
                </div>
                
                <button type="submit" class="btn btn-primary btn-block">Зарегистрироваться</button>
            </form>
            
            <div class="auth-footer">
                <p>Уже есть аккаунт? <a href="{{ url_for('login') }}">Войдите</a></p>
            </div>
        </div>
        
        <div class="auth-decoration">
            <div class="decoration-circle c1"></div>
            <div class="decoration-circle c2"></div>
            <div class="decoration-circle c3"></div>
        </div>
    </div>
</div>
{% endblock %}
