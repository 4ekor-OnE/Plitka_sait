{% extends 'base.html' %}

{% block title %}Редактировать профиль - AVITA{% endblock %}

{% block content %}
<div class="edit-profile-page">
    <div class="container">
        <div class="page-header">
            <h1>Редактировать профиль</h1>
        </div>
        
        <form method="POST" enctype="multipart/form-data" class="profile-form">
            <div class="form-section">
                <h2><i class="fas fa-camera"></i> Фото профиля</h2>
                <div class="avatar-upload">
                    <img src="{{ url_for('static', filename='uploads/' + (current_user.avatar or 'default_avatar.png')) }}" alt="Avatar" id="avatarPreview" onerror="this.src='https://ui-avatars.com/api/?name={{ current_user.username }}&background=random&size=150'">
                    <div class="avatar-actions">
                        <input type="file" id="avatar" name="avatar" accept="image/*" onchange="previewAvatar(this)">
                        <label for="avatar" class="btn btn-outline">
                            <i class="fas fa-upload"></i> Загрузить фото
                        </label>
                    </div>
                </div>
            </div>
            
            <div class="form-section">
                <h2><i class="fas fa-user"></i> Личная информация</h2>
                
                <div class="form-group">
                    <label>Имя пользователя</label>
                    <input type="text" value="{{ current_user.username }}" disabled>
                    <small>Имя пользователя нельзя изменить</small>
                </div>
                
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" value="{{ current_user.email }}" disabled>
                    <small>Email нельзя изменить</small>
                </div>
                
                <div class="form-group">
                    <label for="phone">Телефон</label>
                    <input type="tel" id="phone" name="phone" value="{{ current_user.phone or '' }}" placeholder="+7 (999) 123-45-67">
                </div>
                
                <div class="form-group">
                    <label for="location">Местоположение</label>
                    <input type="text" id="location" name="location" value="{{ current_user.location or '' }}" placeholder="Город, регион">
                </div>
                
                <div class="form-group">
                    <label for="about">О себе</label>
                    <textarea id="about" name="about" rows="4" placeholder="Расскажите о себе...">{{ current_user.about or '' }}</textarea>
                </div>
            </div>
            
            <div class="form-actions">
                <button type="submit" class="btn btn-primary btn-lg">
                    <i class="fas fa-save"></i> Сохранить изменения
                </button>
                <a href="{{ url_for('profile') }}" class="btn btn-outline btn-lg">Отмена</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
function previewAvatar(input) {
    if (input.files && input.files[0]) {
        const reader = new FileReader();
        reader.onload = function(e) {
            document.getElementById('avatarPreview').src = e.target.result;
        }
        reader.readAsDataURL(input.files[0]);
    }
}
</script>
{% endblock %}
