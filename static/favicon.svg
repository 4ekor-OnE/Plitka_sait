<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Центральный круг -->
  <circle cx="50" cy="50" r="8" fill="#1a1a1a"/>
  
  <!-- Верхний фиолетовый квадрат -->
  <rect x="42" y="20" width="20" height="20" rx="4" fill="#7c3aed" transform="rotate(-45 50 30)"/>
  
  <!-- Правый оранжевый квадрат -->
  <rect x="60" y="42" width="20" height="20" rx="4" fill="#ff6b35" transform="rotate(45 70 50)"/>
  
  <!-- Нижний зеленый квадрат -->
  <rect x="42" y="60" width="20" height="20" rx="4" fill="#00d084" transform="rotate(-45 50 70)"/>
  
  <!-- Левый голубой квадрат -->
  <rect x="20" y="42" width="20" height="20" rx="4" fill="#00c4cc" transform="rotate(45 30 50)"/>
</svg>
